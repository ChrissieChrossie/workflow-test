name: Terraform Deploy

on:
    push:
        branches:
            - main

jobs:
    terraform:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: terraform
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: eu-central-1

            - name: Terraform Init
              run: terraform init

            - name: Terraform Apply
              run: terraform apply -auto-approve

            - name: Terraform Output
              id: tf_output
              run: |
                  IP=$(terraform output -json public_ips | jq -r '.[0]')
                  echo "public_ip=$IP" >> "$GITHUB_OUTPUT"

            - name: SSH Setup
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mein_schlüssel
                  chmod 600 ~/.ssh/mein_schlüssel
                  sleep 10
                  ssh-keyscan -H ${{ steps.tf_output.outputs.public_ip }} >> ~/.ssh/known_hosts

            - name: Test SSH Connection
              run: |
                  ssh -i ~/.ssh/mein_schlüssel ubuntu@${{ steps.tf_output.outputs.public_ip }} "echo Verbindung erfolgreich"

            - name: Slack Benachrichtigung
              if: success()
              run: |
                  curl -X POST -H 'Content-type: application/json' \
                    --data "{\"text\":\"✅ Terraform Apply erfolgreich: EC2-Instanz unter ${{ steps.tf_output.outputs.public_ip }} (${{ github.repository }}, Branch ${{ github.ref_name }}, ausgelöst von ${{ github.actor }})\"}" \
                    "${{ secrets.SLACK_WEBHOOK_URL }}"
